
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OpenArt Clone</title>

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 60px;
    }

    input {
      padding: 10px;
      width: 300px;
    }

    button {
      padding: 10px 20px;
      margin-left: 10px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 50px;
      height: 50px;
      border: 6px solid #ccc;
      border-top: 6px solid #09f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <h1>AI Image Generator</h1>

  <input id="prompt" placeholder="Describe your image..." />
  <button onclick="generate()">Generate</button>

  <!-- Loading Spinner -->
  <div id="loading" style="display:none; margin-top:20px;">
    <div class="spinner"></div>
    <p>Generating image… please wait</p>
  </div>

  <!-- Image Output -->
  <img
    id="result"
    width="512"
    height="512"
    style="
      background: #fff;
      border: 2px solid #555;
      margin-top: 20px;
      object-fit: contain;
    "
    alt="Generated image"
  />

  <!-- JS MUST BE LAST -->
  <script src="script.js"></script>
</body>
</html>
